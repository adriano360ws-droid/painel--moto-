<!DOCTYPE html>
 <html lang="pt-BR">
 <head>
 <link rel="manifest" href="manifest.json">
 <meta name="theme-color" content="#000000">
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Painel Moto 2.0</title>
 <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
 <style>
 body{
 margin:0;
 background:black;
 color:#ffffff;
 font-family:Orbitron;
 text-align:center;
 }
 .top{
 padding:10px;
 font-size:22px;
 }
 #clock {
 color:#00ff6a;
 font-weight:bold;
 font-size:24px;
 margin-bottom:10px;
 }
 #oilStatus {
 font-size:20px;
 margin-top:8px;
 margin-bottom:20px;
 }
 .speed{
 font-size:90px;
 margin-top:20px;
 }
 .label{
 font-size:18px;
 opacity:.9;
 margin-bottom:10px;
 }
 .odometro{
 font-size:70px;
 font-weight:bold;
 margin-top:10px;
 color:#ffffff;
 }
 .trips{
 display:flex;
 justify-content:space-around;
 margin-top:20px;
 }
 .box{
 border:1px solid #ffffff;
 padding:10px;
 width:40%;
 }
 .controls{
 margin-top:20px;
 }
 button{
 background:black;
 color:#ffffff;
 border:1px solid #ffffff;
 padding:12px 20px;
 margin:5px;
 font-family:Orbitron;
 font-size:16px;
 }
 input{
 background:black;
 color:#ffffff;
 border:1px solid #ffffff;
 padding:8px;
 width:120px;
 text-align:center;
 font-size:16px;
 margin-bottom:10px;
 }
 .oil{
 margin-top:15px;
 }
 </style>
 </head>
 <body>
 <div class="top">
 <div id="clock"></div>
 <div class="oil" id="oilStatus"></div>
 <button onclick="resetOil()">Troquei o óleo</button>
 </div>
 <div class="label">ODÔMETRO TOTAL</div>
 <div class="odometro" id="totalKm"></div>
 <div class="controls">
 Tempo
 <div id="time">00:00</div>
 </div>
 <div class="controls">
 KM Corrida
 <br><br>
 <input id="kmInput" type="number" step="0.1" placeholder="Ex: 7.4">
 <button onclick="addKm()">Adicionar KM</button>
 </div>
 <div class="controls">
 <button onclick="start()">INICIAR</button>
 <button onclick="stop()">PARAR</button>
 </div>
 <div class="controls">
 <button onclick="ajustarOdometro()">AJUSTAR ODÔMETRO</button>
 </div>
 <script>
 /* CONFIGURAÇÃO */
 const OIL_LIMIT = 1500; // Mantido o limite original de 1500 km
 /* RELÓGIO */
 setInterval(()=>{
 document.getElementById("clock").innerText =
 new Date().toLocaleTimeString("pt-BR")
 },1000)
 /* CARREGAR DADOS SALVOS */
 let totalKm = Number(localStorage.getItem("totalKm")) || 3226.4; // Odômetro total correto
 let oilBase = Number(localStorage.getItem("oilBase")) || (totalKm - (OIL_LIMIT - 957)); // Para ter 957 km restantes
 /* MOSTRAR */
 function updateDisplay(){
 document.getElementById("totalKm").innerText = totalKm.toFixed(1);
 updateOil();
 }
 updateDisplay();
 /* ADICIONAR KM */
 function addKm(){
 let v = parseFloat(document.getElementById("kmInput").value);
 if(!v || v<=0) return;
 totalKm += v;
 localStorage.setItem("totalKm", totalKm);
 document.getElementById("kmInput").value="";
 updateDisplay();
 }
 /* ÓLEO */
 function updateOil(){
 let restante = (oilBase + OIL_LIMIT) - totalKm;
 let txt="";
 let cor="#ffffff";
 if(restante <=0){
 txt = "🔴 PERIGO! TROCAR ÓLEO AGORA";
 cor="#ff0000";
 }
 else if(restante <=300){
 txt = "🟡 ATENÇÃO! TROCA DE ÓLEO PRÓXIMA ("+restante.toFixed(0)+" km)";
 cor="#ffff00";
 }
 else{
 txt = "🟢 PODE RODAR TRANQUILO<br>Faltam: "+restante.toFixed(0)+" km";
 cor="#00ff6a";
 }
 document.getElementById("oilStatus").innerHTML = txt;
 document.getElementById("oilStatus").style.color = cor;
 }
 /* TROCA ÓLEO */
 function resetOil(){
 oilBase = totalKm;
 localStorage.setItem("oilBase", oilBase);
 alert("Óleo trocado!");
 updateOil();
 }
 /* TEMPO */
 let sec=0;
 let timer=null;
 function start(){
 if(timer) return;
 timer=setInterval(()=>{
 sec++;
 let m = Math.floor(sec/60);
 let s = sec%60;
 document.getElementById("time").innerText =
 String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
 },1000);
 }
 function stop(){
 clearInterval(timer);
 timer=null;
 }
 /* AJUSTAR ODÔMETRO */
 function ajustarOdometro() {
     let novoValor = prompt("Digite o novo valor do odômetro:", totalKm);
     if (novoValor && !isNaN(novoValor)) {
         totalKm = Number(novoValor);
         localStorage.setItem("totalKm", totalKm);
         updateDisplay();
         alert("Odômetro ajustado!");
     }
 }
 /* REGISTRAR SERVICE WORKER */
 if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
 }
 </script>
 </body>
 </html>
