<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Moto 2.0</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:#00ff6a;
font-family:Orbitron;
text-align:center;
}

.top{
padding:10px;
font-size:22px; /* Tamanho aumentado */
color:#ffffff; /* Cor branca */
font-weight:bold; /* Negrito */
}

#clock, #oilStatus {
color:#ffffff;
font-weight:bold;
}

.speed{
font-size:90px;
margin-top:20px;
}

.label{
font-size:14px;
opacity:.7;
}

.odometro{
font-size:50px;
margin-top:10px;
}

.trips{
display:flex;
justify-content:space-around;
margin-top:20px;
}

.box{
border:1px solid #00ff6a;
padding:10px;
width:40%;
}

.controls{
margin-top:20px;
}

button{
background:black;
color:#00ff6a;
border:1px solid #00ff6a;
padding:10px;
margin:5px;
font-family:Orbitron;
}

input{
background:black;
color:#00ff6a;
border:1px solid #00ff6a;
padding:5px;
width:80px;
text-align:center;
}

.oil{
margin-top:15px;
font-size:14px;
}

</style>
</head>

<body>

<div class="top">

<div id="clock"></div>

<div class="oil" id="oilStatus"></div>

<button onclick="resetOil()">Troquei o óleo</button>

</div>


<div class="speed" id="speed">0</div>
<div class="label">KM/H</div>


<div class="odometro" id="totalKm"></div>
<div class="label">ODÔMETRO TOTAL</div>


<div class="trips">

<div class="box">
Trip A
<div id="tripA">0</div>
<button onclick="resetTripA()">Reset</button>
</div>

<div class="box">
Trip B
<div id="tripB">0</div>
<button onclick="resetTripB()">Reset</button>
</div>

</div>


<div class="controls">

KM corrida

<br><br>

<input id="kmInput" type="number" step="0.1">

<button onclick="addKm()">Adicionar</button>

</div>


<div class="controls">

<button onclick="start()">INICIAR</button>

<button onclick="stop()">PARAR</button>

</div>


<div class="controls">

Tempo

<div id="time">00:00</div>

</div>


<script>

/* CONFIGURAÇÃO */

const OIL_LIMIT = 1500;


/* RELÓGIO */

setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString("pt-BR")
},1000)


/* CARREGAR DADOS SALVOS */

let totalKm = Number(localStorage.getItem("totalKm")) || 3184.1
let tripA = Number(localStorage.getItem("tripA")) || 0
let tripB = Number(localStorage.getItem("tripB")) || 0
let oilBase = Number(localStorage.getItem("oilBase")) || 2683.1


/* MOSTRAR */

function updateDisplay(){

document.getElementById("totalKm").innerText = totalKm.toFixed(1)
document.getElementById("tripA").innerText = tripA.toFixed(1)
document.getElementById("tripB").innerText = tripB.toFixed(1)

updateOil()

}

updateDisplay()


/* ADICIONAR KM */

function addKm(){

let v = parseFloat(document.getElementById("kmInput").value)

if(!v || v<=0) return

totalKm += v
tripA += v
tripB += v

localStorage.setItem("totalKm", totalKm)
localStorage.setItem("tripA", tripA)
localStorage.setItem("tripB", tripB)

document.getElementById("kmInput").value=""

updateDisplay()

}


/* RESET TRIP */

function resetTripA(){

tripA = 0
localStorage.setItem("tripA", tripA)
updateDisplay()

}

function resetTripB(){

tripB = 0
localStorage.setItem("tripB", tripB)
updateDisplay()

}


/* ÓLEO */

function updateOil(){

let restante = (oilBase + OIL_LIMIT) - totalKm

let txt=""

if(restante <=0){
txt = "⚠ TROCA DE ÓLEO ATRASADA"
}
else if(restante <=300){
txt = "⚠ Troca de óleo próxima ("+restante.toFixed(0)+" km)"
}
else{
txt = "✔ Óleo OK ("+restante.toFixed(0)+" km restantes)"
}

document.getElementById("oilStatus").innerText = txt

}


/* TROCA ÓLEO */

function resetOil(){

oilBase = totalKm

localStorage.setItem("oilBase", oilBase)

alert("Óleo trocado!")

updateOil()

}


/* TEMPO */

let sec=0
let timer=null

function start(){

if(timer) return

timer=setInterval(()=>{

sec++

let m = Math.floor(sec/60)
let s = sec%60

document.getElementById("time").innerText =
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")

},1000)

}

function stop(){

clearInterval(timer)
timer=null

}


/* REGISTRAR SERVICE WORKER */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
