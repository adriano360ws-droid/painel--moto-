<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<title>Painel Moto</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Orbitron;
text-align:center;
}

.top{
padding:10px;
}

#clock{
color:#00ff6a;
font-size:26px;
margin-bottom:10px;
}

#oilStatus{
font-size:22px;
margin-bottom:5px;
}

.odometro{
font-size:80px;
margin-top:10px;
}

.label{
margin-top:20px;
font-size:18px;
}

.controls{
margin-top:25px;
}

button{
background:black;
color:white;
border:1px solid white;
padding:12px 20px;
margin:5px;
font-family:Orbitron;
font-size:16px;
}

input{
background:black;
color:white;
border:1px solid white;
padding:10px;
width:120px;
text-align:center;
font-size:16px;
}

</style>

</head>

<body>

<div class="top">

<div id="clock"></div>

<div id="oilStatus"></div>

<button onclick="resetOil()">Troquei o óleo</button>

</div>

<div class="label">ODÔMETRO TOTAL</div>

<div class="odometro" id="totalKm">0</div>

<div class="controls">

<input id="kmInput" type="number" step="0.1" placeholder="Ex: 7.4">

<br><br>

<button onclick="addKm()">Adicionar KM</button>

</div>

<div class="controls">

Tempo

<div id="time">00:00</div>

</div>

<div class="controls">

<button onclick="start()">INICIAR</button>

<button onclick="stop()">PARAR</button>

</div>

<div class="controls">

<button onclick="ajustarOdometro()">AJUSTAR ODÔMETRO</button>

</div>

<script>

const OIL_LIMIT = 1500;

let totalKm = Number(localStorage.getItem("totalKm")) || 3348.9;
let oilBase = Number(localStorage.getItem("oilBase")) || 2682;

function updateDisplay(){

document.getElementById("totalKm").innerText = totalKm.toFixed(1);

updateOil();

}

function addKm(){

let v = parseFloat(document.getElementById("kmInput").value);

if(!v || v<=0) return;

totalKm += v;

localStorage.setItem("totalKm", totalKm);

document.getElementById("kmInput").value="";

updateDisplay();

}

function updateOil(){

let proximaTroca = oilBase + OIL_LIMIT;

let restante = proximaTroca - totalKm;

if(restante < 0) restante = 0;

let txt="";
let cor="#00ff6a";

if(restante <=0){

txt = "🔴 TROCAR ÓLEO AGORA";
cor="#ff0000";

}
else if(restante <=300){

txt = "🟡 ATENÇÃO<br>Faltam: "+restante.toFixed(0)+" km";
cor="#ffff00";

}
else{

txt = "🟢 PODE RODAR TRANQUILO<br>Faltam: "+restante.toFixed(0)+" km";

}

document.getElementById("oilStatus").innerHTML = txt;
document.getElementById("oilStatus").style.color = cor;

}

function resetOil(){

oilBase = totalKm;

localStorage.setItem("oilBase", oilBase);

alert("Troca de óleo registrada!");

updateDisplay();

}

let sec=0;
let timer=null;

function start(){

if(timer) return;

timer=setInterval(()=>{

sec++;

let m = Math.floor(sec/60);
let s = sec%60;

document.getElementById("time").innerText =
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

},1000);

}

function stop(){

clearInterval(timer);
timer=null;

}

function ajustarOdometro(){

let novo = prompt("Digite o novo valor do odômetro", totalKm);

if(novo && !isNaN(novo)){

totalKm = Number(novo);

localStorage.setItem("totalKm", totalKm);

updateDisplay();

}

}

setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString("pt-BR")
},1000);

updateDisplay();

/* REGISTRAR SERVICE WORKER */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
